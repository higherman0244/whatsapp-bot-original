<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NANA ADDO BOT Dashboard</title>
  <style>
    :root {
      --bg: #0e1a2b;
      --card: #132238;
      --line: #2a4468;
      --ink: #e7f1ff;
      --muted: #9fb6d7;
      --accent: #29bfa2;
      --accent2: #458dff;
      --warn: #ffb86c;
      --bad: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 10%, #152a46, #0a1322 60%);
      min-height: 100vh;
      padding: 14px;
    }
    .grid {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 12px;
    }
    .row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .mini { color: var(--muted); font-size: 0.86rem; }
    h1,h2,h3 { margin: 0 0 8px; }
    h1 { font-size: 1.15rem; }
    h2 { font-size: 0.98rem; }
    h3 { font-size: 0.9rem; }
    .value { font-size: 1.1rem; font-weight: 700; }
    textarea,input,select,button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1d31;
      color: var(--ink);
      padding: 9px;
      font: inherit;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      border: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      cursor: pointer;
      font-weight: 700;
    }
    .btn-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .list {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #0d1727;
      max-height: 220px;
      overflow: auto;
      font-size: 0.84rem;
      line-height: 1.35;
    }
    .item { border-bottom: 1px solid #223a5b; padding: 6px 0; }
    .item:last-child { border-bottom: 0; }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      border: 1px solid #365a8a;
      margin-right: 6px;
      color: #bdd6ff;
    }
    .warn { color: var(--warn); }
    .bad { color: var(--bad); }
    @media (max-width: 1000px) {
      .grid { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
      .btn-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="grid">
    <section class="card">
      <h1>NANA ADDO BOT Dashboard</h1>
      <div class="mini">Token-protected live control + memory viewer</div>
      <div style="height:8px"></div>
      <div class="row">
        <div class="card">
          <h3>Uptime</h3>
          <div id="uptime" class="value">--</div>
        </div>
        <div class="card">
          <h3>Daily AI</h3>
          <div id="dailyReq" class="value">0 req</div>
          <div id="dailyTok" class="mini">0 tokens</div>
        </div>
        <div class="card">
          <h3>Monthly AI</h3>
          <div id="monthReq" class="value">0 req</div>
          <div id="monthTok" class="mini">0 tokens</div>
        </div>
      </div>

      <div style="height:10px"></div>
      <h2>Ask AI</h2>
      <textarea id="prompt" placeholder="Ask anything..."></textarea>
      <button id="askBtn">Ask</button>
      <div style="height:8px"></div>
      <div id="answer" class="list"></div>

      <div style="height:10px"></div>
      <h2>Conversation Thread</h2>
      <input id="threadJid" placeholder="Filter JID (optional)" />
      <input id="threadQ" placeholder="Search text (optional)" />
      <button id="threadBtn">Load Thread</button>
      <div id="threadList" class="list"></div>

      <div style="height:10px"></div>
      <h2>Exports</h2>
      <div class="btn-row">
        <button data-export="memory:json">Memory JSON</button>
        <button data-export="events:json">Events JSON</button>
        <button data-export="assist:json">Assist JSON</button>
        <button data-export="longterm:json">Long-term JSON</button>
        <button data-export="memory:csv">Memory CSV</button>
        <button data-export="events:csv">Events CSV</button>
      </div>
    </section>

    <section class="card">
      <h2>Dashboard Auth</h2>
      <input id="token" placeholder="Dashboard token" />
      <button id="saveTokenBtn">Save Token</button>
      <div class="mini">Header used: <code>x-dashboard-token</code></div>

      <div style="height:10px"></div>
      <h2>Live Memory</h2>
      <div id="memoryMeta" class="mini">--</div>
      <div id="memoryList" class="list"></div>

      <div style="height:10px"></div>
      <h2>Top Active Users</h2>
      <div id="usersList" class="list"></div>

      <div style="height:10px"></div>
      <h2>Security Events</h2>
      <select id="eventType">
        <option value="">All</option>
        <option value="view_once">View Once</option>
        <option value="message_delete">Message Delete</option>
      </select>
      <button id="eventsBtn">Load Events</button>
      <div id="eventsList" class="list"></div>

      <div style="height:10px"></div>
      <h2>Owner Assist Inbox</h2>
      <div id="assistList" class="list"></div>
    </section>
  </div>

  <script>
    const tokenInput = document.getElementById("token");
    const savedToken = localStorage.getItem("dashboard_token") || "";
    tokenInput.value = savedToken;

    function token() {
      return (localStorage.getItem("dashboard_token") || "").trim();
    }

    async function api(path, options = {}) {
      const headers = Object.assign({}, options.headers || {}, {
        "x-dashboard-token": token(),
      });
      const res = await fetch(path, { ...options, headers });
      if (!res.ok) {
        const body = await res.text().catch(() => "");
        throw new Error(body || `HTTP ${res.status}`);
      }
      const ct = res.headers.get("content-type") || "";
      if (ct.includes("application/json")) return res.json();
      return res.text();
    }

    function esc(v) {
      return String(v ?? "").replace(/[<>&]/g, (m) => ({ "<":"&lt;", ">":"&gt;", "&":"&amp;" }[m]));
    }

    function fmtAgo(iso) {
      if (!iso) return "-";
      const diff = Math.max(0, Date.now() - new Date(iso).getTime());
      const min = Math.floor(diff / 60000);
      if (min < 1) return "just now";
      if (min < 60) return `${min}m ago`;
      const h = Math.floor(min / 60);
      if (h < 24) return `${h}h ago`;
      return `${Math.floor(h / 24)}d ago`;
    }

    async function refreshStats() {
      const s = await api("/api/stats");
      const upMin = Math.max(1, Math.floor((Date.now() - Number(s.startedAt || Date.now())) / 60000));
      document.getElementById("uptime").textContent = `${upMin} min`;
      document.getElementById("dailyReq").textContent = `${(s.aiUsage?.daily?.requests || 0)} req`;
      document.getElementById("dailyTok").textContent = `${(s.aiUsage?.daily?.totalTokens || 0)} tokens`;
      document.getElementById("monthReq").textContent = `${(s.aiUsage?.monthly?.requests || 0)} req`;
      document.getElementById("monthTok").textContent = `${(s.aiUsage?.monthly?.totalTokens || 0)} tokens`;
    }

    async function refreshMemory() {
      const m = await api("/api/memory?limit=30");
      document.getElementById("memoryMeta").textContent = `Recent: ${m.total || 0} messages`;
      const mem = (m.recent || []).slice().reverse().map((x) =>
        `<div class="item"><span class="tag">${esc(fmtAgo(x.at))}</span><strong>${esc(x.sender)}</strong><div>${esc(x.text || "[non-text]")}</div></div>`
      ).join("") || "<div class='item'>No memory.</div>";
      document.getElementById("memoryList").innerHTML = mem;

      const users = (m.topUsers || []).map((u) =>
        `<div class="item"><span class="tag">${u.isAdmin ? "admin" : "user"}</span><strong>${esc(u.jid)}</strong><div>messages: ${u.messageCount}</div></div>`
      ).join("") || "<div class='item'>No users.</div>";
      document.getElementById("usersList").innerHTML = users;
    }

    async function refreshEvents() {
      const t = document.getElementById("eventType").value;
      const url = t ? `/api/events?type=${encodeURIComponent(t)}` : "/api/events";
      const data = await api(url);
      const html = (data.rows || []).slice().reverse().map((e) =>
        `<div class="item"><span class="tag">${esc(e.type)}</span><strong>${esc(e.sender || e.chat || "-")}</strong><div>${esc(e.chat || "")}</div><div class="mini">${esc(fmtAgo(e.at))}</div></div>`
      ).join("") || "<div class='item'>No events.</div>";
      document.getElementById("eventsList").innerHTML = html;
    }

    async function refreshAssist() {
      const data = await api("/api/assist?status=pending");
      const html = (data.rows || []).map((a) => {
        const id = esc(a.id);
        return `<div class="item" data-id="${id}">
          <span class="tag">${esc(a.kind || "text")}</span><strong>${esc(a.senderJid || "-")}</strong>
          <div><span class="mini">chat:</span> ${esc(a.chatJid || "")}</div>
          <div><span class="mini">msg:</span> ${esc(a.originalText || "")}</div>
          <div><span class="mini">suggest:</span> ${esc(a.suggestedReply || "")}</div>
          <textarea class="assist-reply" placeholder="Edit reply before send">${esc(a.suggestedReply || "")}</textarea>
          <div class="btn-row">
            <button class="assist-send">Send</button>
            <button class="assist-reject">Reject</button>
          </div>
        </div>`;
      }).join("") || "<div class='item'>No pending assist items.</div>";
      document.getElementById("assistList").innerHTML = html;
      bindAssistButtons();
    }

    function bindAssistButtons() {
      document.querySelectorAll(".assist-send").forEach((btn) => {
        btn.onclick = async () => {
          const root = btn.closest(".item");
          const id = root?.dataset?.id;
          const replyText = root?.querySelector(".assist-reply")?.value || "";
          if (!id || !replyText.trim()) return;
          try {
            await api("/api/assist/send", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id, replyText }),
            });
            await refreshAssist();
          } catch (e) {
            alert("Send failed: " + e.message);
          }
        };
      });

      document.querySelectorAll(".assist-reject").forEach((btn) => {
        btn.onclick = async () => {
          const root = btn.closest(".item");
          const id = root?.dataset?.id;
          if (!id) return;
          try {
            await api("/api/assist/reject", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id }),
            });
            await refreshAssist();
          } catch (e) {
            alert("Reject failed: " + e.message);
          }
        };
      });
    }

    document.getElementById("saveTokenBtn").onclick = async () => {
      localStorage.setItem("dashboard_token", tokenInput.value.trim());
      await bootstrap();
    };

    document.getElementById("askBtn").onclick = async () => {
      const prompt = document.getElementById("prompt").value.trim();
      if (!prompt) return;
      const out = document.getElementById("answer");
      out.innerHTML = "<div class='item'>Thinking...</div>";
      try {
        const data = await api("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });
        out.innerHTML = `<div class='item'><span class='tag'>${esc(data.source || "ai")}</span>${esc(data.text || "")}</div>`;
      } catch (e) {
        out.innerHTML = `<div class='item bad'>${esc(e.message)}</div>`;
      }
      await refreshMemory().catch(() => {});
    };

    document.getElementById("threadBtn").onclick = async () => {
      const jid = document.getElementById("threadJid").value.trim();
      const q = document.getElementById("threadQ").value.trim();
      const url = `/api/thread?jid=${encodeURIComponent(jid)}&q=${encodeURIComponent(q)}`;
      const data = await api(url).catch((e) => ({ rows: [], error: e.message }));
      const html = (data.rows || []).slice().reverse().map((x) =>
        `<div class="item"><span class="tag">${esc(new Date(x.at).toLocaleTimeString())}</span><strong>${esc(x.sender)}</strong><div>${esc(x.text || "")}</div></div>`
      ).join("") || `<div class='item ${data.error ? "bad" : ""}'>${esc(data.error || "No thread items")}</div>`;
      document.getElementById("threadList").innerHTML = html;
    };

    document.getElementById("eventsBtn").onclick = () => refreshEvents().catch(() => {});

    document.querySelectorAll("[data-export]").forEach((btn) => {
      btn.onclick = async () => {
        const [type, format] = String(btn.dataset.export || "").split(":");
        if (!type || !format) return;
        try {
          const data = await api(`/api/export?type=${encodeURIComponent(type)}&format=${encodeURIComponent(format)}`);
          const blob = new Blob([typeof data === "string" ? data : JSON.stringify(data, null, 2)], {
            type: format === "csv" ? "text/csv" : "application/json",
          });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `${type}.${format}`;
          a.click();
          URL.revokeObjectURL(a.href);
        } catch (e) {
          alert("Export failed: " + e.message);
        }
      };
    });

    async function bootstrap() {
      try {
        await Promise.all([refreshStats(), refreshMemory(), refreshEvents(), refreshAssist()]);
      } catch (e) {
        document.getElementById("answer").innerHTML = `<div class='item bad'>${esc(e.message)}</div>`;
      }
    }

    bootstrap();
    setInterval(() => {
      refreshStats().catch(() => {});
      refreshMemory().catch(() => {});
      refreshAssist().catch(() => {});
    }, 5000);
  </script>
</body>
</html>
